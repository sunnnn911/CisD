<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에너지 놀이터</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <p class="eyebrow">지속가능 에너지 탐구 프로젝트</p>
    <h1>에너지 놀이터</h1>
    <p class="subtitle">놀이기구 위 손가락 버튼을 터치해 아이들이 만드는 운동에너지를 전기로 바꿔보세요</p>

    <div class="gauge-wrap">
      <div class="gauge">
        <div class="gauge-cells" id="gaugeCells"></div>
        <div class="gauge-label">
          <span id="gaugePercent">0</span><span class="percent-sign">%</span>
        </div>
      </div>
      <p class="gauge-caption">마이크로그리드 충전량 <span id="gaugeStatus">가동 대기 중</span></p>
    </div>
  </header>

  <section class="storage-strip">
    <div class="storage-item"><span class="storage-dot cap"></span>슈퍼커패시터 순간 저장</div>
    <div class="storage-item"><span class="storage-dot ess"></span>폐배터리 ESS 장기 저장</div>
    <div class="storage-item"><span class="storage-dot grid"></span>마이크로그리드 배전</div>
  </section>

  <div class="scene-stage">

    <!-- ===================== 낮의 놀이터 풍경 (사진 배경) ===================== -->
    <section class="scene playground-scene active" id="scenePlayground">
      <img src="assets/playground-bg.jpg" alt="에너지 놀이터 풍경" class="landscape-bg">

      <div class="spark-field" id="sparkField">
        <div class="spark-layer" id="spark-slide"      style="left:9.8%;  top:42%;"></div>
        <div class="spark-layer" id="spark-swing"      style="left:33.2%; top:47.9%;"></div>
        <div class="spark-layer" id="spark-seesaw"     style="left:15%;   top:63.5%;"></div>
        <div class="spark-layer" id="spark-carousel"   style="left:39.7%; top:65.4%;"></div>
        <div class="spark-layer" id="spark-numberpad"  style="left:70.9%; top:50.8%;"></div>
        <div class="spark-layer" id="spark-wheel"      style="left:85.3%; top:48.8%;"></div>
      </div>

      <div class="touch-field" id="touchField">
        <button class="touch-btn" data-device="slide"     style="left:9.8%;  top:42%;"><span class="glow"></span>👆</button>
        <button class="touch-btn" data-device="swing"     style="left:33.2%; top:47.9%;"><span class="glow"></span>👆</button>
        <button class="touch-btn" data-device="seesaw"    style="left:15%;   top:63.5%;"><span class="glow"></span>👆</button>
        <button class="touch-btn" data-device="carousel"  style="left:39.7%; top:65.4%;"><span class="glow"></span>👆</button>
        <button class="touch-btn" data-device="numberpad" style="left:70.9%; top:50.8%;"><span class="glow"></span>👆</button>
        <button class="touch-btn" data-device="wheel"     style="left:85.3%; top:48.8%;"><span class="glow"></span>👆</button>
      </div>
    </section>

    <!-- ===================== 밤의 마을 풍경 ===================== -->
    <section class="scene village-scene" id="sceneVillage">
      <svg viewBox="0 0 800 220" class="village-svg" id="villageSvg">
        <rect x="0" y="0" width="800" height="220" class="sky" />
        <circle cx="700" cy="45" r="26" class="moon-sun" id="moonSun" />

        <g class="turbine" id="turbine1">
          <line x1="60" y1="200" x2="60" y2="90" class="pole" />
          <g class="blades" id="blades1">
            <line x1="60" y1="90" x2="60" y2="55" class="blade" />
            <line x1="60" y1="90" x2="90" y2="105" class="blade" />
            <line x1="60" y1="90" x2="30" y2="105" class="blade" />
          </g>
        </g>
        <g class="turbine" id="turbine2">
          <line x1="130" y1="200" x2="130" y2="100" class="pole" />
          <g class="blades" id="blades2">
            <line x1="130" y1="100" x2="130" y2="65" class="blade" />
            <line x1="130" y1="100" x2="160" y2="115" class="blade" />
            <line x1="130" y1="100" x2="100" y2="115" class="blade" />
          </g>
        </g>

        <g class="solar-roof">
          <polygon points="220,200 220,150 280,140 280,200" class="panel" />
          <line x1="220" y1="165" x2="280" y2="155" class="panel-line" />
          <line x1="220" y1="180" x2="280" y2="170" class="panel-line" />
        </g>

        <g class="house" id="house1">
          <rect x="330" y="150" width="70" height="50" class="house-body" />
          <polygon points="325,150 400,150 362,120" class="house-roof" />
          <rect x="345" y="165" width="16" height="16" class="window" id="win1" />
          <rect x="370" y="165" width="16" height="16" class="window" id="win2" />
        </g>
        <g class="house" id="house2">
          <rect x="430" y="140" width="80" height="60" class="house-body" />
          <polygon points="424,140 512,140 468,105" class="house-roof" />
          <rect x="450" y="158" width="18" height="18" class="window" id="win3" />
          <rect x="480" y="158" width="18" height="18" class="window" id="win4" />
        </g>
        <g class="house" id="house3">
          <rect x="540" y="155" width="65" height="45" class="house-body" />
          <polygon points="535,155 610,155 572,128" class="house-roof" />
          <rect x="555" y="170" width="15" height="15" class="window" id="win5" />
        </g>

        <g class="lamp" id="lamp1">
          <line x1="640" y1="200" x2="640" y2="130" class="lamp-pole" />
          <circle cx="640" cy="125" r="8" class="lamp-bulb" />
        </g>
        <g class="lamp" id="lamp2">
          <line x1="740" y1="200" x2="740" y2="130" class="lamp-pole" />
          <circle cx="740" cy="125" r="8" class="lamp-bulb" />
        </g>

        <g class="still">
          <polygon points="30,200 30,175 55,168 55,200" class="still-body" />
        </g>
        <circle cx="150" cy="192" r="9" class="water-roller" />

        <rect x="0" y="198" width="800" height="22" class="ground" />
      </svg>

      <p class="village-message" id="villageMessage">에너지 놀이터가 만든 전력으로 마을에 불이 켜졌습니다</p>
    </section>

  </div>

  <button class="reset-btn" id="resetBtn">처음부터 다시</button>

  <script src="script.js"></script>
</body>
</html>
